<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4f8cf7"/>
      <stop offset="1" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9eef6"/>
    </linearGradient>
  </defs>

  <!-- app tile -->
  <rect x="72" y="72" width="880" height="880" rx="196" fill="url(#bg)"/>
  <!-- soft top sheen -->
  <rect x="72" y="72" width="880" height="420" rx="196" fill="#ffffff" opacity="0.07"/>

  <!-- drop shadow for the slide card -->
  <rect x="206" y="322" width="612" height="416" rx="30" fill="#0b1b46" opacity="0.30"/>

  <!-- slide card -->
  <rect x="198" y="306" width="612" height="416" rx="30" fill="url(#card)"/>
  <!-- header bar with rounded top corners only -->
  <path d="M198 386 V336 a30 30 0 0 1 30 -30 H780 a30 30 0 0 1 30 30 V386 Z" fill="#1e3a8a"/>
  <!-- TeX·Slide wordmark in the header -->
  <text x="236" y="368" font-family="Georgia, 'Times New Roman', serif" font-size="56" font-weight="700" fill="#ffffff">TeX</text>
  <text x="360" y="368" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="48" font-weight="600" fill="#a9c8fb">Slide</text>

  <!-- slide body content lines -->
  <rect x="236" y="448" width="448" height="28" rx="14" fill="#c4d1e4"/>
  <rect x="236" y="506" width="372" height="28" rx="14" fill="#d4ddec"/>
  <rect x="236" y="564" width="408" height="28" rx="14" fill="#d4ddec"/>
  <rect x="236" y="622" width="250" height="28" rx="14" fill="#e2e9f3"/>

  <!-- green "editable notes" pencil badge -->
  <circle cx="742" cy="690" r="92" fill="#22c55e" stroke="#ffffff" stroke-width="14"/>
  <g transform="translate(742 690) rotate(45)">
    <rect x="-21" y="-44" width="42" height="66" rx="7" fill="#ffffff"/>
    <rect x="-21" y="-44" width="42" height="16" rx="7" fill="#d9f7e3"/>
    <rect x="-21" y="-12" width="42" height="6" fill="#1e3a8a" opacity="0.25"/>
    <path d="M-21 22 H21 L0 52 Z" fill="#ffffff"/>
    <path d="M-7 39 H7 L0 52 Z" fill="#1e3a8a"/>
  </g>
</svg>
